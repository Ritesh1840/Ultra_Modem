<head>
<meta charset="UTF-8">
<title>SENDER · ULTRAMODEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="scanlines"></div>
<div class="wrap">

  <header>
    <div>
      <h1>▚ ULTRAMODEM</h1>
      <div class="sub">acoustic FSK data link — <a href="index.html" style="color:inherit;">back to menu</a></div>
    </div>
    <div class="clock">MODE<br><b>▲ SENDER</b></div>
  </header>

  <!-- TRANSMITTER -->
  <div class="panel" data-tag="04–07 · TRANSMITTER">
    <label for="txText">MESSAGE</label>
    <input type="text" id="txText" placeholder="Hello" value="Hello" maxlength="64">
    <div class="btnrow">
      <button class="primary" id="sendBtn">▲ SEND</button>
    </div>
    <div class="readout" style="margin-top:10px;">
      <span class="k">PACKET LENGTH</span>
      <span class="v" id="txLen">0 bytes</span>
    </div>
    <div class="readout">
      <span class="k">CHECKSUM (XOR)</span>
      <span class="v" id="txChecksum">—</span>
    </div>
    <label style="margin-top:10px;">FULL BIT STREAM</label>
    <div class="bitstream" id="txBits">—</div>
    <div class="hint">Preamble · start · length · data · checksum · end — each bit held for 100ms.</div>
  </div>

  <div class="panel" data-tag="LOG">
    <label>EVENT LOG</label>
    <div class="log" id="eventLog"></div>
  </div>

</div>
